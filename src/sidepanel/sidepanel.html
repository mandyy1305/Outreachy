<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RemoteStar Outreach</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body data-stage="detect">
    <header>
      <div class="brand"><span class="brand-dot"></span> RemoteStar <span class="brand-sub">Outreach</span></div>
      <nav class="tabs">
        <div class="seg">
          <button id="tab-compose" class="tab active" type="button">Compose</button>
          <button id="tab-history" class="tab" type="button">History</button>
        </div>
        <button id="open-options" class="icon-btn" type="button" title="Settings">⚙</button>
      </nav>
    </header>

    <!-- COMPOSE VIEW -->
    <section id="view-compose" class="view">

      <!-- STAGE 1: detect -->
      <div id="stage-detect" class="stage">
        <div class="empty-state-hero">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
            <circle cx="11" cy="9" r="2.2"></circle>
            <path d="M7.5 14.5c.7-1.4 2-2.2 3.5-2.2s2.8.8 3.5 2.2"></path>
          </svg>
          <p id="page-status" class="status muted"></p>
          <button id="btn-scrape" class="primary" type="button">Scrape this profile</button>
          <div id="company-block" class="hidden">
            <button id="btn-find-people" class="primary" type="button">Find people to pitch</button>
            <p class="empty-caption">Runs your saved searches on this company's People tab and ranks who's worth contacting.</p>
          </div>
        </div>
        <p id="people-status" class="status"></p>
      </div>

      <!-- STAGE 2: compose -->
      <div id="stage-compose" class="stage hidden">
        <div class="prospect-card">
          <div id="prospect-avatar" class="prospect-avatar" aria-hidden="true"></div>
          <div class="prospect-id">
            <div id="prospect-name" class="prospect-name"></div>
            <div id="prospect-headline" class="prospect-headline"></div>
          </div>
          <button id="btn-restart" class="icon-btn" type="button" title="Start over with another page">✕</button>
        </div>

        <details id="review-details">
          <summary><span>Scraped data</span> <span id="scrape-summary" class="count"></span></summary>
          <label class="field">
            <span class="field-label">Name <span class="badge" data-badge="name"></span></span>
            <input id="f-name" type="text" />
          </label>
          <label class="field">
            <span class="field-label">Headline <span class="badge" data-badge="headline"></span></span>
            <input id="f-headline" type="text" />
          </label>
          <label class="field">
            <span class="field-label">Work history <span class="badge" data-badge="experience"></span></span>
            <textarea id="f-experience" rows="4"></textarea>
          </label>
          <label class="field">
            <span class="field-label">About <span class="badge" data-badge="about"></span></span>
            <textarea id="f-about" rows="3"></textarea>
          </label>
          <label class="field">
            <span class="field-label">Recent activity <span class="badge" data-badge="activity"></span></span>
            <textarea id="f-activity" rows="3"></textarea>
          </label>
          <button id="btn-activity" class="small" type="button" title="Opens their activity page briefly in a background tab to read more posts">Fetch full recent posts…</button>
        </details>

        <details id="research-details">
          <summary><span>Research</span> <span id="research-status" class="count"></span></summary>
          <textarea id="f-research" rows="5" placeholder="Optional. Run deep research or paste your own notes — feeds messages and call notes."></textarea>
          <button id="btn-research" class="small" type="button" title="Web-searches the prospect and company via your AI provider">Deep research (web search)</button>
        </details>

        <div class="compose-card">
          <div class="field-label">Channel</div>
          <div id="channel-pills" class="pills" role="radiogroup" aria-label="Channel">
            <button type="button" class="pill active" data-channel="linkedin">LinkedIn</button>
            <button type="button" class="pill" data-channel="whatsapp">WhatsApp</button>
            <button type="button" class="pill" data-channel="email">Email</button>
          </div>

          <label class="field">
            <span class="field-label">Template</span>
            <select id="f-template"></select>
          </label>

          <div class="field hidden" id="design-field">
            <span class="field-label">Email look</span>
            <div id="design-pills" class="pills" role="radiogroup" aria-label="Email look">
              <button type="button" class="pill" data-design="plain" title="Plain text, exactly like a hand-typed mail — best deliverability">Natural</button>
              <button type="button" class="pill" data-design="clean" title="Styled HTML: clean typography, subtle accent, signature">Clean</button>
              <button type="button" class="pill" data-design="card" title="Branded card with RemoteStar header and a booking button">Card</button>
            </div>
          </div>

          <div id="contact-block" class="contact-block hidden">
            <div class="contact-row">
              <button id="btn-find-contact" class="secondary small" type="button">Find email &amp; phone</button>
              <span id="contact-status" class="muted"></span>
            </div>
            <div class="contact-group">
              <div class="field-label">Email <span id="email-count" class="count"></span></div>
              <div id="email-list" class="contact-list"></div>
            </div>
            <div class="contact-group">
              <div class="field-label">Phone <span id="phone-count" class="count"></span></div>
              <div id="phone-list" class="contact-list"></div>
            </div>
          </div>
        </div>

        <div class="action-bar">
          <button id="btn-generate" class="primary" type="button">Generate messages</button>
          <button id="btn-callnotes" class="secondary" type="button" title="Call-prep brief: hooks, pitch angles, objections">Call notes</button>
        </div>
      </div>

      <!-- STAGE 3: results -->
      <div id="stage-results" class="stage hidden">
        <div class="results-bar">
          <button id="btn-back" class="back-btn" type="button">←</button>
          <span id="results-context" class="results-context"></span>
        </div>
        <div id="variants"></div>
        <div id="callnotes" class="hidden"></div>
        <div id="people-list"></div>
      </div>

      <p id="gen-status" class="status"></p>
    </section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view hidden">
      <div class="history-toolbar">
        <span id="history-count" class="muted"></span>
        <span class="spacer"></span>
        <button id="btn-export" class="small" type="button">Export</button>
        <button id="btn-import" class="small" type="button">Import</button>
        <button id="btn-clear-history" class="danger small" type="button">Clear all</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
      <input id="history-search" type="search" placeholder="Search by name…" />
      <div id="history-list"></div>
    </section>

    <footer class="account-bar">
      <span id="account-status" class="muted">✉ checking Gmail account…</span>
      <button id="account-action" class="row-link hidden" type="button"></button>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
